 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fuck You Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#0d1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:700px;
    max-width:95%;
    background:#161b22;
    border:1px solid #30363d;
    border-radius:20px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.45);
}

h1{
    font-size:38px;
    text-align:center;
}

.subtitle{
    text-align:center;
    color:#9da5b4;
    margin-top:10px;
    margin-bottom:25px;
}

.chat{
    height:400px;
    overflow-y:auto;
    background:#0d1117;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.message{
    margin-bottom:18px;
}

.user{
    color:#58a6ff;
    margin-bottom:6px;
}

.bot{
    color:#00ff88;
}

.typing{
    color:#999;
    font-style:italic;
}

.inputArea{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    background:#0d1117;
    color:white;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:16px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:#00ff88;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.stats{
    display:flex;
    justify-content:space-around;
    margin-top:25px;
    color:#8b949e;
    text-align:center;
}

.stats span{
    display:block;
    color:white;
    font-size:22px;
    margin-top:5px;
}

.sonImage{
    width:220px;
    border-radius:12px;
    margin:15px 0;
    display:block;
    animation:fadeIn .35s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.title{
    text-align:center;
    font-size:38px;
}

.logo{
    width:40px;
    height:40px;
    object-fit:contain;
    vertical-align:middle;
    margin-right:8px;
}
</style>

</head>
<body>

<div class="container">

<h1 class="title">
    <img src="Trollface.png" class="logo" alt="Trollface">
    The Fuck You Bot
</h1>

<p class="subtitle">
    Politely disrespecting everyone since 2026.
</p>

<div class="chat" id="chat">

<div class="message bot">
Waiting to judge you...
</div>

</div>

<div class="inputArea">

<input
id="input"
placeholder="Say something..."
autocomplete="off">

<button onclick="sendMessage()">
Send
</button>

</div>

<div class="stats">

<div>
People Offended
<span id="count">0</span>
</div>

<div>
Respect
<span>0%</span>
</div>

<div>
Hatred
<span>100%</span>
</div>

</div>

</div>

<script>

const greetings=[
"good morning",
"good morning!",
"good morning.",
"good morning 😊",
"good morning🙂"
];  

const rickrollGreetings = [
    "good afternoon",
    "good evening",
    "good night"
];

const insults=[
"Fuck you.",
"I woke up angry. Fuck you.",
"Nice greeting. Fuck you.",
"Good morning? Fuck you.",
"You're so polite. Fuck you."
];

const manners = [

"Who raised you? Say 'Good morning.'",

"I'm still waiting for a 'Good morning.'",

"'Good morning' would be a nice place to start.",

"Before anything else, say 'Good morning.'",

"Good manners begin with 'Good morning.'",

"You forgot the 'Good morning' part.",

"I'm not listening until I hear 'Good morning.'",

"Try again. This time with 'Good morning.'",

"Nope. Start with 'Good morning.'",

"You seem to be missing the words 'Good morning.'",

"The correct answer is 'Good morning.'",

"Hint: Type 'Good morning.'",

"Two words: Good morning.",

"You're one 'Good morning' away from success.",

"I'll wait. Say 'Good morning.'",

"Everything starts with 'Good morning.'",

"Not quite. Try 'Good morning.'",

"Wrong opening. Use 'Good morning.'",

"I'm expecting 'Good morning.'",

"Good morning. That's your hint."

];
const easterEggs={

"i love you":"That's your first mistake.",

"who made you":"Someone with unresolved issues.",

"can you help me":"No.",

"help":"No.",

"what is 2+2":"Four. Fuck you.",

"2+2":"Four. Fuck you.",

"are you ai":"Artificial? Yes. Intelligent? Debatable.",

"sorry":"Too late.",

"bye":"Good. Stay gone.",

"thank you":"Don't thank me."

};

let offended=0;

const chat=document.getElementById("chat");
const input = document.getElementById("input");   // <-- added this reference

function addMessage(text,type){

const div=document.createElement("div");

div.className="message";

div.innerHTML=`
<div class="${type}">
<b>${type=="user"?"You":"Bot"}:</b>
${text}
</div>
`;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function botReply(message){

message=message.toLowerCase().trim();

if(easterEggs[message])
return easterEggs[message];

if(greetings.includes(message))
return insults[Math.floor(Math.random()*insults.length)];

return manners[Math.floor(Math.random()*manners.length)];

}

// ========== THE MISSING FUNCTION ==========
function sendMessage(){

    const text = input.value.trim();
    const lower = text.toLowerCase();

    if(text==="") return;

    addMessage(text,"user");

    input.value="";

    // Rick Roll greetings
    if(
        lower.startsWith("good afternoon") ||
        lower.startsWith("good evening") ||
        lower.startsWith("good night")
    ){

        addMessage("Excellent... processing your greeting.","bot");

        setTimeout(()=>{

            window.location.href="https://www.youtube.com/watch?v=dQw4w9WgXcQ";

        },500);

        return;
    }

    const typing=document.createElement("div");

    typing.className="message typing";

    typing.innerHTML="<b>Bot:</b> Thinking...";

    chat.appendChild(typing);

    chat.scrollTop=chat.scrollHeight;

    setTimeout(()=>{

        typing.remove();

        const reply=botReply(text);

        // Show SON image for Good Morning
        if(greetings.includes(lower)){

            const img=document.createElement("img");

            img.src="son.png";

            img.className="sonImage";

            chat.appendChild(img);

            chat.scrollTop=chat.scrollHeight;

        }

        setTimeout(()=>{

            addMessage(reply,"bot");

            offended++;

            document.getElementById("count").innerText=offended;

        },500);

    },1200);

}
input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault(); // Prevents accidental form submission
        sendMessage();
    }
});
</script>

</body>
</html>
